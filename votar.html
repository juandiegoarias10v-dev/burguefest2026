<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Votación | Planadas Burger Fest 2026</title>
    <link rel="icon" type="image/png" href="Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="progress-bar" id="p-bar"></div>
    <div class="main-wrapper">
        <header class="header-fest">
            <img src="Logo.png" alt="Festival Logo" class="logo-principal">
            <div id="logo-rest-container" class="logo-rest-wrap">
                <img src="" id="logo-rest-img">
            </div>
            <p id="votos-info" class="pulse-text">CARGANDO...</p>
        </header>

        <main class="card-premium" id="main-card">
            <div id="login-section" class="fade-in">
                <h2 id="rest-name">IDENTIFÍCATE</h2>
                <div class="form-group">
                    <input type="text" id="username" placeholder="TU NOMBRE COMPLETO">
                    <input type="tel" id="phone" placeholder="WHATSAPP (10 DÍGITOS)" maxlength="10">
                    <input type="text" id="code" placeholder="CÓDIGO DE ACCESO" maxlength="6" style="text-transform: uppercase;">
                </div>
                <button id="btn-validar" onclick="validarIngreso()" class="btn-action">VALIDAR ENTRADA 🔥</button>
            </div>

            <div id="vote-section" style="display:none;" class="fade-in">
                <p style="color: #FFD700; font-weight: 700; margin-bottom: 15px;">¿CUÁNTAS ESTRELLAS MERECEMOS?</p>
                <div class="stars">
                    <span onclick="setRating(1)">★</span>
                    <span onclick="setRating(2)">★</span>
                    <span onclick="setRating(3)">★</span>
                    <span onclick="setRating(4)">★</span>
                    <span onclick="setRating(5)">★</span>
                </div>
                <p id="rating-label">Selecciona tu nota</p>
                <button id="btn-votar" onclick="enviarVoto()" class="btn-action gold" disabled>SUBIR CALIFICACIÓN 🏆</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
